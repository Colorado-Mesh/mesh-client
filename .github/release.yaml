changelog:
  categories:
    - title: '🚀 New Features'
      labels:
        - feature
        - enhancement
    - title: '🐛 Bug Fixes'
      labels:
        - bug
    - title: '🧹 Maintenance & Chores'
      labels:
        - chore
        - internal
        - dependencies
    - title: '📝 Documentation'
      labels:
        - documentation
  exclude:
    labels:
      - skip-release
