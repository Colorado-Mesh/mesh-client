version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    open-pull-requests-limit: 10
    versioning-strategy: lockfile-only
    groups:
      electron-framework:
        patterns:
          - "electron"
      all-other-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Group all GitHub Actions updates into one PR to reduce noise
      all-actions:
        patterns:
          - "*"
