name: Build Flatpak

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  flatpak:
    name: Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Generate offline pnpm sources
        run: |
          pip3 install flatpak-node-generator
          flatpak-node-generator --type pnpm pnpm-lock.yaml -o flatpak/generated-sources.json

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.coloradomesh.MeshClient.flatpak
          manifest-path: org.coloradomesh.MeshClient.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

  publish:
    name: Publish to GitHub Release
    needs: flatpak
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: org.coloradomesh.MeshClient
          path: flatpak-dist

      - name: Attach Flatpak to release
        uses: softprops/action-gh-release@v2
        with:
          files: flatpak-dist/*.flatpak
