name: Build Flatpak
run-name: Build Flatpak${{ github.event_name == 'workflow_dispatch' && ' (no release)' || '' }}

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  # Both arches use the flathub-infra container (Flathub remote, flatpak-builder, privileged
  # system installs). aarch64 uses GitHub's native ARM runners — do not build on bare
  # ubuntu-latest with apt flatpak; that lacks --privileged and fails with
  # "Flatpak system operation Deploy not allowed for user".
  flatpak:
    name: Flatpak (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Generate offline pnpm sources
        run: |
          FBTOOLS=git+https://github.com/flatpak/flatpak-builder-tools
          pip3 install "${FBTOOLS}@6f3f08759ac9859492b728f57f5163bf584c47ff#subdirectory=node"
          flatpak-node-generator pnpm pnpm-lock.yaml -o flatpak/generated-sources.json

      # flatpak/flatpak-github-actions v6 appends -${arch} to the artifact name on upload;
      # keep bundle arch-agnostic here to avoid org.coloradomesh.MeshClient-aarch64-aarch64.flatpak.
      - uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb
        with:
          bundle: org.coloradomesh.MeshClient.flatpak
          manifest-path: org.coloradomesh.MeshClient.yml
          arch: ${{ matrix.arch }}
          branch: stable
          cache-key: flatpak-builder-${{ matrix.arch }}-${{ github.sha }}
          upload-artifact: true

  publish:
    name: Publish to GitHub Release
    needs: flatpak
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: 'org.coloradomesh.MeshClient-*'
          path: flatpak-dist

      - name: Flatten arch-suffixed bundles for release
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dir in flatpak-dist/*/; do
            name=$(basename "$dir")
            flatpak=$(find "$dir" -maxdepth 1 -type f -name '*.flatpak' -print -quit)
            if [ -z "${flatpak:-}" ]; then
              echo "no .flatpak file in ${dir}" >&2
              exit 1
            fi
            staging="flatpak-dist/.${name}.staging"
            mv "$flatpak" "$staging"
            rm -rf "$dir"
            mv "$staging" "flatpak-dist/${name}"
          done

      - name: Attach Flatpak to release
        # softprops/action-gh-release v2
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: flatpak-dist/*.flatpak
